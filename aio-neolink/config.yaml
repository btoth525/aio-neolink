name: aio-neolink
version: "0.1.0"
slug: aio_neolink
description: "Reliable Reolink Baichuan-to-RTSP bridge with self-healing watchdog, PTZ/lights/siren control, and a web GUI"
url: https://github.com/btoth525/aio-neolink

arch:
  - aarch64
  - amd64

# Start after network is up so Neolink can reach cameras on boot.
startup: services

# HA-level watchdog — restarts the add-on if the process exits unexpectedly.
# Our Python watchdog handles Neolink hangs; this handles the supervisor itself.
watchdog: true

# Host network required: Neolink must reach cameras on :9000 and bind RTSP on :8554.
host_network: true

# Ingress wires the FastAPI web UI into the HA sidebar.
# "Open Web UI" button and the sidebar panel both use this.
ingress: true
ingress_port: 8099
panel_icon: mdi:cctv
panel_title: aio-neolink

init: false

ports:
  8554/tcp: 8554
  8099/tcp: null
ports_description:
  8554/tcp: "RTSP output for Frigate / go2rtc / Blue Iris"
  8099/tcp: "Web GUI + REST API (Ingress preferred; expose for direct access)"

# User-configurable options — shown in the HA add-on Configuration tab.
options:
  log_level: info
  watchdog_timeout: 45
  health_interval: 15

schema:
  log_level: list(trace|debug|info|warn|error)
  watchdog_timeout: int(0,3600)
  health_interval: int(5,600)
